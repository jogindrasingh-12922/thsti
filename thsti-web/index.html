    <script>
        function openTab(event, tabId) {
            // Hide all tab content
            let tabContents = document.querySelectorAll(".tab-content");
            tabContents.forEach(tab => tab.classList.remove("active"));

            // Remove active class from all buttons
            let tabButtons = document.querySelectorAll(".tab-button");
            tabButtons.forEach(button => button.classList.remove("active"));

            // Show the selected tab content and highlight the button
            document.getElementById(tabId).classList.add("active");
            event.currentTarget.classList.add("active");
        }

    <script>
        window.addEventListener("scroll", function () {

            let section = document.querySelector(".what-we-offer-second");
            let title = document.querySelector(".what-we-offer-second .sec-title-box");

            let sectionTop = section.offsetTop;
            let sectionHeight = section.offsetHeight;
            let scrollY = window.scrollY;

            // Sticky Start
            if (scrollY >= sectionTop) {
                title.classList.add("sticky-active");
            } else {
                title.classList.remove("sticky-active");
            }

            // Sticky End (Section End Pe)
            if (scrollY >= sectionTop + sectionHeight - title.offsetHeight) {
                title.classList.remove("sticky-active");
            }

        });

    <script>
        const circle = document.querySelector(".progress-ring-circle");
        const scrollBtn = document.getElementById("scrollTopBtn");

        const radius = 26;
        const circumference = 2 * Math.PI * radius;

        if (circle) {
            circle.style.strokeDasharray = circumference;
            circle.style.strokeDashoffset = circumference;
        }

        window.addEventListener("scroll", () => {
            if (!circle || !scrollBtn) return;
            const scrollTop = window.scrollY;
            const docHeight = document.body.scrollHeight - window.innerHeight;
            const scrollPercent = scrollTop / docHeight;

            const offset = circumference - (scrollPercent * circumference);
            circle.style.strokeDashoffset = offset;

            if (scrollTop > 200) {
                scrollBtn.style.display = "flex";
            } else {
                scrollBtn.style.display = "none";
            }
        });

        if (scrollBtn) {
            scrollBtn.addEventListener("click", () => {
                window.scrollTo({
                    top: 0,
                    behavior: "smooth"
                });
            });
        }
    </script>

            if (baseFontSize > 12) {
                baseFontSize--;

            document.body.classList.add('high-contrast');

            document.body.classList.remove('high-contrast');

                    circle.style.strokeDashoffset = offset;
                }

                if (scrollBtn) {
                    if (scrollTop > 200) {
                        scrollBtn.style.display = "flex";
                    } else {
                        scrollBtn.style.display = "none";
                    }
                }
            });

            if (scrollBtn) {
                scrollBtn.addEventListener("click", () => {
                    window.scrollTo({
                        top: 0,
                        behavior: "smooth"
                    });
                });
            }
        });
    </script>
</body>

</html>
